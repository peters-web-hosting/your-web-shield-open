name: Code Quality

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Syntax check
        run: python -m compileall -q .
